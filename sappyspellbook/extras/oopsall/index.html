<body>
 
<button onclick="showRandomWords()">Generate Choices</button>
<div id="result"></div>
 
<script>
  const words = ["Archer", "Assassin", "Paladin", "Anti-Paladin", "Monk", "Barbarian",
                 "Warrior", "Scout", "Bard", "Druid", "Healer", "Wizard"];
 
  function showRandomWords() {
    // Shuffle a copy of the array and take the first 3
    const shuffled = [...words].sort(() => Math.random() - 0.5);
    const chosen = shuffled.slice(0, 3);
    document.getElementById("result").textContent = chosen.join(", ");
  }
</script>
