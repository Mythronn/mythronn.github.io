<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oops All!</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7JR53Y27TN"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-7JR53Y27TN');
</script>
<title>Oops All!</title>

</head>
<body>
 
<button onclick="showRandomWords()">Generate Choices</button>
<div id="result"></div>
<div class="midnav">
        <a   class="Anti-Paladin" hidden>ANTI-PALADIN</a>
        <a   class="Archer" hidden>ARCHER</a>
        <a   class="Assassin" hidden>ASSASSIN</a>
        <a   class="Barbarian" hidden>BARBARIAN</a>
        <a   class="Monk" hidden>MONK</a>
        <a   class="Paladin" hidden>PALADIN</a>
        <a   class="Scout" hidden>SCOUT</a>
        <a   class="Warrior" hidden>WARRIOR</a>
        <a   class="Druid" hidden>DRUID</a>
        <a   class="Healer" hidden>HEALER</a>
        <a   class="Bard" hidden>BARD</a>
        <a   class="Wizard" hidden>WIZARD</a>
      </div>  
 
<script>
    

  const words = ["Archer", "Assassin", "Paladin", "Anti-Paladin", "Monk", "Barbarian",
                 "Warrior", "Scout", "Bard", "Druid", "Healer", "Wizard"];
 
  function showRandomWords() {
    document.getElementsByClassName("Anti-Paladin")[0].style.display = "none";
    document.getElementsByClassName("Archer")[0].style.display = "none";
    document.getElementsByClassName("Assassin")[0].style.display = "none";
    document.getElementsByClassName("Barbarian")[0].style.display = "none";
    document.getElementsByClassName("Monk")[0].style.display = "none";
    document.getElementsByClassName("Paladin")[0].style.display = "none";
    document.getElementsByClassName("Scout")[0].style.display = "none";
    document.getElementsByClassName("Warrior")[0].style.display = "none";
    document.getElementsByClassName("Druid")[0].style.display = "none";
    document.getElementsByClassName("Healer")[0].style.display = "none";
    document.getElementsByClassName("Bard")[0].style.display = "none";
    document.getElementsByClassName("Wizard")[0].style.display = "none";

    const shuffled = [...words].sort(() => Math.random() - 0.5);
    const chosen = shuffled.slice(0, 3);
    document.getElementById("result").textContent = chosen.join(", ");
    document.getElementsByClassName(chosen[0])[0].style.display = "inline-block";
    document.getElementsByClassName(chosen[1])[0].style.display = "inline-block";
    document.getElementsByClassName(chosen[2])[0].style.display = "inline-block";
    
  }
</script>
 
</body>
</html>
